name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Flutter Doctor
        run: flutter doctor
        
      - name: Create native project files
        run: |
          cd mobile
          flutter create .
          
      - name: Patch Android minSdkVersion
        run: |
          # The location of build.gradle might vary depending on flutter version
          # Usually it is mobile/android/app/build.gradle
          if [ -f mobile/android/app/build.gradle ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' mobile/android/app/build.gradle
          fi
          
      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
